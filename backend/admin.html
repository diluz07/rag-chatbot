<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazonia - Admin Upload</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'glow': 'glow 3s ease-in-out infinite alternate',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        },
                        glow: {
                            '0%': { opacity: '0.3', transform: 'scale(0.95)' },
                            '100%': { opacity: '0.8', transform: 'scale(1.05)' }
                        }
                    }
                }
            }
        }
        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap');

        body {
            font-family: 'Outfit', system-ui, sans-serif;
        }
    </style>
</head>

<body
    class="bg-gray-50 text-gray-900 dark:bg-black dark:text-white transition-colors duration-300 min-h-screen flex flex-col relative">

    <!-- Login Overlay -->
    <div id="loginOverlay"
        class="fixed inset-0 z-50 bg-white/95 dark:bg-black/95 backdrop-blur-xl flex items-center justify-center transition-opacity duration-300">
        <div
            class="bg-white dark:bg-[#0a0a0a] border border-gray-200 dark:border-white/10 p-10 rounded-3xl shadow-2xl max-w-md w-full mx-4 flex flex-col items-center">
            <div class="relative w-16 h-16 flex items-center justify-center mb-8 animate-float">
                <div
                    class="absolute inset-0 bg-gradient-to-tr from-blue-600 to-purple-600 rounded-2xl blur-lg animate-glow">
                </div>
                <div
                    class="relative w-full h-full bg-black dark:bg-white rounded-2xl shadow-xl flex items-center justify-center border border-white/10 text-white dark:text-black p-3">
                    <svg viewBox="0 0 24 24" fill="none" class="w-full h-full drop-shadow-md">
                        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                            d="M12 14c-3.314 0-6-2.686-6-6s2.686-6 6-6 6 2.686 6 6-2.686 6-6 6z" />
                        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                            d="M4 22v-2c0-3.314 2.686-6 6-6h4c3.314 0 6 2.686 6 6v2" />
                        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                            d="M6.5 7.5A6.5 6.5 0 0117.5 7.5" />
                        <rect x="4" y="8" width="4" height="6" rx="2" fill="currentColor" stroke="none" />
                        <rect x="16" y="8" width="4" height="6" rx="2" fill="currentColor" stroke="none" />
                        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                            d="M6 14v1c0 1.657 1.343 3 3 3h1" />
                        <circle cx="10" cy="18" r="1.5" fill="currentColor" stroke="none" />
                        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                            d="M9 10h1.5M13.5 10H15" />
                    </svg>
                </div>
            </div>
            <h2 class="text-2xl font-black tracking-tight mb-2">Admin Access</h2>
            <p class="text-sm text-gray-500 mb-8 text-center">Please enter the master password to access the knowledge
                base controls.</p>

            <form id="loginForm" class="w-full">
                <div class="relative w-full mb-4">
                    <input type="password" id="adminPassword" placeholder="Enter Password"
                        class="w-full pl-4 pr-12 py-3 rounded-xl bg-gray-50 dark:bg-white/5 border border-gray-200 dark:border-white/10 focus:outline-none focus:border-blue-500 transition-colors text-center"
                        required>
                    <button type="button" id="togglePasswordBtn"
                        class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 p-2 transition-colors focus:outline-none"
                        onclick="togglePasswordVisibility()">
                        <svg id="eyeIconOpen" class="w-5 h-5 hidden" fill="none" stroke="currentColor"
                            viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z">
                            </path>
                        </svg>
                        <svg id="eyeIconClosed" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21">
                            </path>
                        </svg>
                    </button>
                </div>
                <button type="submit"
                    class="w-full px-4 py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 transition-all active:scale-95 shadow-lg">Unlock
                    Admin Panel</button>
            </form>
            <p id="loginError" class="text-red-500 text-sm mt-4 hidden font-medium">Incorrect password. Access denied.
            </p>
        </div>
    </div>
    <nav
        class="sticky top-0 z-40 bg-white/90 dark:bg-black/80 backdrop-blur-xl border-b border-gray-200 dark:border-white/10">
        <div class="max-w-4xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div
                    class="w-8 h-8 flex items-center justify-center bg-black dark:bg-white text-white dark:text-black font-black text-lg rounded-lg shadow-sm">
                    A</div>
                <span class="font-black tracking-tighter text-xl">AMAZONIA ADMIN</span>
            </div>
            <button onclick="toggleTheme()"
                class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-white/10 transition-colors">
                <svg class="w-5 h-5 dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z">
                    </path>
                </svg>
                <svg class="w-5 h-5 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z">
                    </path>
                </svg>
            </button>
        </div>
    </nav>

    <main class="flex-1 max-w-4xl mx-auto w-full p-6 py-12">
        <div class="mb-10 text-center flex flex-col items-center">
            <h1 class="text-3xl md:text-5xl font-black mb-4 tracking-tight">Knowledge Base Upload</h1>
            <p class="text-gray-500 dark:text-gray-400 mb-6">Upload PDF documents to train the RAG chatbot's knowledge
                base.</p>
            <button onclick="clearKnowledgeBase()"
                class="px-5 py-2 text-sm font-semibold text-red-600 bg-red-50 hover:bg-red-100 dark:text-red-400 dark:bg-red-500/10 dark:hover:bg-red-500/20 rounded-full transition-colors border border-red-200 dark:border-red-500/20 flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16">
                    </path>
                </svg>
                Clear Knowledge Base
            </button>
        </div>

        <div class="bg-white dark:bg-[#0a0a0a] border border-gray-200 dark:border-white/10 rounded-2xl p-8 shadow-sm">
            <form id="uploadForm" class="flex flex-col items-center">
                <div class="w-full border-2 border-dashed border-gray-300 dark:border-white/20 rounded-xl p-12 text-center hover:border-blue-500 dark:hover:border-blue-400 transition-colors cursor-pointer group"
                    onclick="document.getElementById('fileInput').click()">
                    <svg class="w-12 h-12 mx-auto text-gray-400 group-hover:text-blue-500 transition-colors mb-4"
                        fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12">
                        </path>
                    </svg>
                    <p class="text-gray-600 dark:text-gray-300 font-medium mb-1">Click to select PDF files</p>
                    <p class="text-sm text-gray-400">or drag and drop</p>
                    <input type="file" id="fileInput" name="files" accept=".pdf" multiple class="hidden"
                        onchange="updateFileList(this)" />
                </div>

                <div id="fileList" class="w-full mt-6 space-y-2 empty:hidden"></div>

                <button type="submit" id="submitBtn" disabled
                    class="mt-8 w-full md:w-auto px-10 py-4 bg-gray-200 text-gray-400 dark:bg-white/5 dark:text-gray-500 rounded-xl font-bold transition-all disabled:cursor-not-allowed">
                    Upload to Knowledge Base
                </button>
            </form>

            <div id="statusMessage" class="mt-6 text-center text-sm font-medium hidden"></div>
        </div>
    </main>

    <script>
        const fileInput = document.getElementById('fileInput');
        const fileList = document.getElementById('fileList');
        const submitBtn = document.getElementById('submitBtn');
        const statusMessage = document.getElementById('statusMessage');
        const form = document.getElementById('uploadForm');

        const loginOverlay = document.getElementById('loginOverlay');
        const loginForm = document.getElementById('loginForm');
        const passwordInput = document.getElementById('adminPassword');
        const loginError = document.getElementById('loginError');

        function togglePasswordVisibility() {
            const eyeOpen = document.getElementById('eyeIconOpen');
            const eyeClosed = document.getElementById('eyeIconClosed');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeOpen.classList.remove('hidden');
                eyeClosed.classList.add('hidden');
            } else {
                passwordInput.type = 'password';
                eyeOpen.classList.add('hidden');
                eyeClosed.classList.remove('hidden');
            }
        }

        // Check if already logged in via session
        document.addEventListener('DOMContentLoaded', () => {
            const savedPassword = sessionStorage.getItem('adminPassword');
            if (savedPassword) {
                // Pre-verify saved password smoothly
                verifyPassword(savedPassword).then(success => {
                    if (success) loginOverlay.classList.add('hidden');
                    else sessionStorage.removeItem('adminPassword');
                });
            }
        });

        async function verifyPassword(pwd) {
            try {
                const res = await fetch('/verify-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: pwd })
                });
                return res.ok;
            } catch (e) {
                return false;
            }
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const pwd = passwordInput.value;
            const btn = loginForm.querySelector('button[type="submit"]');
            btn.disabled = true;
            btn.innerText = "Verifying...";

            const success = await verifyPassword(pwd);
            if (success) {
                sessionStorage.setItem('adminPassword', pwd);
                loginOverlay.classList.add('opacity-0');
                setTimeout(() => loginOverlay.classList.add('hidden'), 300);
            } else {
                loginError.classList.remove('hidden');
                passwordInput.value = '';
                passwordInput.focus();
            }
            btn.disabled = false;
            btn.innerText = "Unlock Admin Panel";
        });

        let dataTransfer = new DataTransfer();

        function updateFileList(input) {
            // Add new files to the dataTransfer object
            if (input.files) {
                Array.from(input.files).forEach(file => {
                    // Prevent duplicates based on name and size
                    const isDuplicate = Array.from(dataTransfer.files).some(f => f.name === file.name && f.size === file.size);
                    if (!isDuplicate) {
                        dataTransfer.items.add(file);
                    }
                });
            }

            // Sync the true input with our dataTransfer
            fileInput.files = dataTransfer.files;

            renderFileList();
        }

        function removeFile(index) {
            const newDt = new DataTransfer();
            const files = Array.from(dataTransfer.files);

            // Re-add all files except the one at the removed index
            for (let i = 0; i < files.length; i++) {
                if (i !== index) newDt.items.add(files[i]);
            }

            dataTransfer = newDt;
            fileInput.files = dataTransfer.files;

            renderFileList();
        }

        function renderFileList() {
            fileList.innerHTML = '';
            const currentFiles = dataTransfer.files;

            if (currentFiles.length > 0) {
                Array.from(currentFiles).forEach((file, index) => {
                    const el = document.createElement('div');
                    el.className = "flex items-center justify-between p-3 bg-gray-50 dark:bg-white/5 rounded-lg border border-gray-100 dark:border-white/10 group";
                    el.innerHTML = `
                        <div class="flex flex-col overflow-hidden">
                            <span class="text-sm text-gray-700 dark:text-gray-200 truncate font-medium">${file.name}</span>
                            <span class="text-xs text-gray-500">${(file.size / 1024 / 1024).toFixed(2)} MB</span>
                        </div>
                        <button type="button" onclick="removeFile(${index})" class="p-1.5 text-gray-400 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-500/10 rounded transition-colors" title="Remove file">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                        </button>
                    `;
                    fileList.appendChild(el);
                });
                submitBtn.disabled = false;
                submitBtn.className = "mt-8 w-full md:w-auto px-10 py-4 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 shadow-lg transition-all transform active:scale-95";
            } else {
                submitBtn.disabled = true;
                submitBtn.className = "mt-8 w-full md:w-auto px-10 py-4 bg-gray-200 text-gray-400 dark:bg-white/5 dark:text-gray-500 rounded-xl font-bold transition-all disabled:cursor-not-allowed";
            }
            statusMessage.classList.add('hidden');
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (fileInput.files.length === 0) return;

            submitBtn.disabled = true;
            submitBtn.innerText = 'Uploading & Processing...';
            statusMessage.classList.remove('hidden');
            statusMessage.className = "mt-6 text-center text-sm font-medium text-blue-600 dark:text-blue-400 block";
            statusMessage.innerText = "Processing documents. This may take a moment...";

            const formData = new FormData();
            Array.from(fileInput.files).forEach(file => {
                formData.append('files', file);
            });

            try {
                const res = await fetch('/upload', {
                    method: 'POST',
                    headers: {
                        'X-Admin-Password': sessionStorage.getItem('adminPassword')
                    },
                    body: formData
                });

                if (res.ok) {
                    statusMessage.className = "mt-6 text-center text-sm font-medium text-green-600 dark:text-green-400 block";
                    statusMessage.innerText = "Success! Documents added to knowledge base.";

                    // Clear the selection on success
                    dataTransfer = new DataTransfer();
                    fileInput.files = dataTransfer.files;
                    renderFileList();

                    submitBtn.innerText = 'Upload to Knowledge Base';
                } else {
                    const err = await res.json();
                    statusMessage.className = "mt-6 text-center text-sm font-medium text-red-600 dark:text-red-400 block";
                    statusMessage.innerText = "Error: " + (err.detail || "Upload failed");
                    submitBtn.disabled = false;
                    submitBtn.innerText = 'Retry Upload';
                }
            } catch (err) {
                statusMessage.className = "mt-6 text-center text-sm font-medium text-red-600 dark:text-red-400 block";
                statusMessage.innerText = "Error connecting to server.";
                submitBtn.disabled = false;
                submitBtn.innerText = 'Retry Upload';
            }
        });

        async function clearKnowledgeBase() {
            const pwdPrompt = prompt("CRITICAL WARNING:\nAre you sure you want to permanently clear the knowledge base?\n\nTo authorize this action, please re-enter the Master Password:");

            if (pwdPrompt === null) {
                return; // User cancelled
            }

            statusMessage.classList.remove('hidden');
            statusMessage.className = "mt-6 text-center text-sm font-medium text-blue-600 dark:text-blue-400 block";
            statusMessage.innerText = "Verifying authorization & clearing knowledge base...";

            try {
                const res = await fetch('/clear', {
                    method: 'DELETE',
                    headers: {
                        'X-Admin-Password': pwdPrompt
                    }
                });

                if (res.ok) {
                    statusMessage.className = "mt-6 text-center text-sm font-medium text-green-600 dark:text-green-400 block";
                    statusMessage.innerText = "Success! Knowledge base has been completely cleared.";
                } else {
                    const err = await res.json();
                    statusMessage.className = "mt-6 text-center text-sm font-medium text-red-600 dark:text-red-400 block";
                    if (res.status === 401) {
                        statusMessage.innerText = "Authorization Failed: Incorrect master password provided.";
                    } else {
                        statusMessage.innerText = "Error: " + (err.detail || "Failed to clear knowledge base");
                    }
                }
            } catch (err) {
                statusMessage.className = "mt-6 text-center text-sm font-medium text-red-600 dark:text-red-400 block";
                statusMessage.innerText = "Error connecting to server.";
            }
        }
    </script>
</body>

</html>
